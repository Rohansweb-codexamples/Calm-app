<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dreams Music Player</title>
    <!-- Custom DJ Kit Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='5' y='25' width='90' height='50' rx='5' fill='%231e1b4b'/%3E%3Ccircle cx='25' cy='50' r='18' fill='%23020617'/%3E%3Ccircle cx='25' cy='50' r='5' fill='%236366f1'/%3E%3Ccircle cx='75' cy='50' r='18' fill='%23020617'/%3E%3Ccircle cx='75' cy='50' r='5' fill='%23a855f7'/%3E%3Crect x='45' y='35' width='10' height='30' rx='1' fill='%230f172a'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .track-item.active {
            background: rgba(99, 102, 241, 0.2);
            border-left: 4px solid #6366f1;
        }

        /* DJ Kit Animations */
        @keyframes rotate-deck {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes needle-drift {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(2deg); }
        }

        @keyframes wave-bounce {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        .spinning {
            animation: rotate-deck 3s linear infinite;
            transform-origin: center;
        }

        .drifting {
            animation: needle-drift 4s ease-in-out infinite;
            transform-origin: 10px 10px;
        }

        .wave-bar {
            animation: wave-bounce 0.5s ease-in-out infinite;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #6366f1;
            margin-top: -5px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.8);
        }

        /* Animation */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .pulse { animation: pulse-slow 3s infinite ease-in-out; }
    </style>
</head>
<body class="p-4">

    <div class="glass max-w-4xl w-full rounded-3xl overflow-hidden flex flex-col md:flex-row h-auto md:h-[600px]">
        
        <!-- Left Side: DJ Kit, Cover & Visualizer -->
        <div class="w-full md:w-1/2 p-8 flex flex-col items-center justify-between bg-black/20 border-r border-white/5">
            <!-- Animated DJ Kit Vector -->
            <div class="w-full mb-4 px-4">
                <svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto drop-shadow-xl">
                    <defs>
                        <linearGradient id="kitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Main Mixer Console -->
                    <rect x="20" y="40" width="360" height="100" rx="8" fill="#1e1b4b" stroke="#312e81" stroke-width="2" />
                    <rect x="160" y="50" width="80" height="80" rx="4" fill="#0f172a" /> <!-- Mixer Section -->
                    
                    <!-- Left Turntable -->
                    <circle cx="90" cy="90" r="40" fill="#020617" />
                    <circle cx="90" cy="90" r="38" fill="none" stroke="#1e293b" stroke-width="1" />
                    <g class="spinning" id="left-vinyl">
                        <circle cx="90" cy="90" r="35" fill="#111827" />
                        <circle cx="90" cy="90" r="10" fill="url(#kitGrad)" opacity="0.8" />
                        <rect x="89" y="55" width="2" height="10" fill="white" opacity="0.3" />
                    </g>
                    <!-- Left Needle -->
                    <g transform="translate(125, 60)" class="drifting">
                        <rect x="0" y="0" width="4" height="40" rx="2" fill="#94a3b8" transform="rotate(-30)" />
                    </g>

                    <!-- Right Turntable -->
                    <circle cx="310" cy="90" r="40" fill="#020617" />
                    <circle cx="310" cy="90" r="38" fill="none" stroke="#1e293b" stroke-width="1" />
                    <g class="spinning" id="right-vinyl" style="animation-duration: 2.5s">
                        <circle cx="310" cy="90" r="35" fill="#111827" />
                        <circle cx="310" cy="90" r="10" fill="url(#kitGrad)" opacity="0.8" />
                        <rect x="309" y="55" width="2" height="10" fill="white" opacity="0.3" />
                    </g>
                    <!-- Right Needle -->
                    <g transform="translate(275, 60)" class="drifting">
                        <rect x="0" y="0" width="4" height="40" rx="2" fill="#94a3b8" transform="rotate(30)" />
                    </g>

                    <!-- Mixer Sliders -->
                    <rect x="175" y="60" width="4" height="60" rx="2" fill="#1e293b" />
                    <rect x="170" y="80" width="14" height="8" rx="2" fill="#6366f1" />
                    
                    <rect x="225" y="60" width="4" height="60" rx="2" fill="#1e293b" />
                    <rect x="220" y="95" width="14" height="8" rx="2" fill="#a855f7" />

                    <!-- LED Levels (Animated) -->
                    <g transform="translate(195, 60)">
                        <rect class="wave-bar" x="0" y="0" width="3" height="15" fill="#22c55e" style="animation-delay: 0.1s" />
                        <rect class="wave-bar" x="5" y="0" width="3" height="25" fill="#22c55e" style="animation-delay: 0.3s" />
                        <rect class="wave-bar" x="10" y="0" width="3" height="10" fill="#eab308" style="animation-delay: 0.2s" />
                    </g>
                </svg>
            </div>

            <div class="relative group">
                <div id="art-container" class="w-40 h-40 md:w-52 md:h-52 rounded-2xl bg-gradient-to-tr from-indigo-600 to-purple-600 flex items-center justify-center glow pulse overflow-hidden shadow-2xl">
                    <svg class="w-20 h-20 text-white/50" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <h2 id="current-title" class="text-xl font-semibold tracking-tight">Select a track</h2>
                <p id="current-artist" class="text-indigo-400 text-sm mt-1">Neon Dreams Series</p>
            </div>

            <!-- Simple Progress -->
            <div class="w-full mt-4 px-4">
                <div class="flex justify-between text-[10px] text-gray-400 mb-1">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
                <input type="range" id="progress-bar" value="0" step="0.1" class="w-full cursor-pointer">
            </div>
        </div>

        <!-- Right Side: Controls & Playlist -->
        <div class="w-full md:w-1/2 flex flex-col p-6 h-full">
            <div class="flex items-center justify-center space-x-8 mb-8">
                <button id="prev-btn" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="play-btn" class="w-16 h-16 bg-indigo-500 rounded-full flex items-center justify-center hover:bg-indigo-400 transition-all transform active:scale-95 glow">
                    <svg id="play-icon" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="next-btn" class="text-gray-400 hover:text-white transition-colors">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-4">Playlist</p>
                <div id="playlist" class="space-y-1">
                    <!-- Tracks will be injected here -->
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-white/5 flex items-center space-x-4">
                <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-24">
            </div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        const tracks = [
            { id: 0, title: "Accelerate", file: "https://rohansweb-codexamples.github.io/Calm-app/Neon_Dreams_Accelerate.mp3" },
            { id: 1, title: "Accelerate (Mix 1)", file: "https://rohansweb-codexamples.github.io/Calm-app/Neon_Dreams_Accelerate%20(1).mp3" },
            { id: 2, title: "Accelerate (Mix 2)", file: "https://rohansweb-codexamples.github.io/Calm-app/Neon_Dreams_Accelerate%20(2).mp3" },
            { id: 3, title: "Accelerate (Extended)", file: "https://rohansweb-codexamples.github.io/Calm-app/Neon_Dreams_Accelerate%20(Extended).mp3" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const volumeSlider = document.getElementById('volume-slider');
        const playlistContainer = document.getElementById('playlist');
        const currentTitle = document.getElementById('current-title');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');

        const leftVinyl = document.getElementById('left-vinyl');
        const rightVinyl = document.getElementById('right-vinyl');

        function initPlaylist() {
            playlistContainer.innerHTML = '';
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `track-item flex items-center justify-between p-3 rounded-xl cursor-pointer hover:bg-white/5 transition-all group`;
                item.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 rounded bg-white/10 flex items-center justify-center text-xs text-gray-400 group-hover:text-indigo-400">${index + 1}</div>
                        <div>
                            <p class="text-sm font-medium text-gray-200">${track.title}</p>
                            <p class="text-xs text-gray-500">Neon Dreams</p>
                        </div>
                    </div>
                `;
                item.onclick = () => loadTrack(index, true);
                item.dataset.index = index;
                playlistContainer.appendChild(item);
            });
            updateActiveTrack();
        }

        function loadTrack(index, autoPlay = false) {
            currentTrackIndex = index;
            const track = tracks[currentTrackIndex];
            
            audio.pause();
            audio.src = track.file; 
            audio.load(); 
            
            currentTitle.textContent = track.title;
            updateActiveTrack();
            
            if (autoPlay) {
                playTrack();
            }
        }

        function updateActiveTrack() {
            document.querySelectorAll('.track-item').forEach((item, idx) => {
                if (idx === currentTrackIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function playTrack() {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    toggleKitAnimation(true);
                }).catch(e => {
                    console.error("Play failed:", e);
                    isPlaying = false;
                });
            }
        }

        function pauseTrack() {
            audio.pause();
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            toggleKitAnimation(false);
        }

        function toggleKitAnimation(on) {
            const style = on ? 'running' : 'paused';
            leftVinyl.style.animationPlayState = style;
            rightVinyl.style.animationPlayState = style;
            document.querySelectorAll('.wave-bar').forEach(bar => {
                bar.style.animationPlayState = style;
            });
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) pauseTrack();
            else playTrack();
        });

        prevBtn.addEventListener('click', () => {
            let index = currentTrackIndex - 1;
            if (index < 0) index = tracks.length - 1;
            loadTrack(index, true);
        });

        nextBtn.addEventListener('click', () => {
            let index = currentTrackIndex + 1;
            if (index >= tracks.length) index = 0;
            loadTrack(index, true);
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progress || 0;
                timeCurrent.textContent = formatTime(audio.currentTime);
                timeTotal.textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            nextBtn.click();
        });

        progressBar.addEventListener('input', () => {
            if (audio.duration) {
                const time = (progressBar.value / 100) * audio.duration;
                audio.currentTime = time;
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        window.onload = () => {
            initPlaylist();
            loadTrack(0, false);
            toggleKitAnimation(false);
        };
    </script>
</body>
</html>
